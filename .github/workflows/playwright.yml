name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      E2E_CLERK_USER_USERNAME: "ada-test@cushlabs.ai"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # pnpm/action-setup v6 reads the pnpm version from the `packageManager`
      # field in package.json (single source of truth). It also handles store
      # caching internally, so the previous manual `actions/cache@v5` step has
      # been removed.
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Clerk test users
        if: env.CLERK_SECRET_KEY != ''
        run: pnpm test:setup

      - name: Generate Clerk testing token
        if: env.CLERK_SECRET_KEY != ''
        id: clerk-token
        run: |
          TOKEN=$(curl -s -X POST https://api.clerk.com/v1/testing_tokens \
            -H "Authorization: Bearer $CLERK_SECRET_KEY" | jq -r '.token')
          echo "CLERK_TESTING_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "Generated Clerk testing token"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run all Playwright tests (with secrets)
        if: env.CLERK_SECRET_KEY != ''
        run: pnpm test

      - name: Run mocked Playwright tests only (no secrets — Dependabot/fork PRs)
        if: env.CLERK_SECRET_KEY == ''
        run: pnpm test:mocked

      - uses: actions/upload-artifact@v7
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
