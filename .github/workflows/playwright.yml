name: Playwright Tests
# Only run on PRs — main pushes already deploy via Vercel, the test result
# can't gate anything that hasn't already shipped. This also eliminates the
# duplicate failure email per merge (one for the PR's run + one for main's
# post-merge run).
on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      E2E_CLERK_USER_USERNAME: "ada-test@cushlabs.ai"

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Clerk test users
        if: env.CLERK_SECRET_KEY != ''
        run: pnpm test:setup

      - name: Generate Clerk testing token
        if: env.CLERK_SECRET_KEY != ''
        id: clerk-token
        run: |
          TOKEN=$(curl -s -X POST https://api.clerk.com/v1/testing_tokens \
            -H "Authorization: Bearer $CLERK_SECRET_KEY" | jq -r '.token')
          echo "CLERK_TESTING_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "Generated Clerk testing token"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      # Required gate: the mocked embed-widget suite runs without secrets and
      # is the source of truth for "did this PR break the widget?". Fast,
      # deterministic, no flake. If this fails, the workflow fails — and you
      # WILL get an email.
      - name: Run mocked Playwright tests (required)
        run: pnpm test:mocked

      # Best-effort: the auth-dependent e2e + routes suites have pre-existing
      # environmental fragility (real DB seeding, real OpenAI calls, real
      # Clerk users). Until those tests are stabilized, run them for
      # diagnostic value but DON'T fail the workflow on their result — no
      # email noise on every PR.
      - name: Run auth-dependent Playwright tests (best-effort, won't block)
        if: env.CLERK_SECRET_KEY != ''
        continue-on-error: true
        run: pnpm exec playwright test --project=setup --project=e2e --project=routes

      - uses: actions/upload-artifact@v7
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
